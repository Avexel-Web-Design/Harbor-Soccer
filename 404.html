<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="Harbor Soccer page not found. Return to the Harbor Soccer homepage for programs, schedules, and contact information."
  />
  <title>Page Not Found - Harbor Soccer, Inc.</title>
  <link rel="icon" type="image/png" href="images/icon.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Junicode:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
</head>

<body class="error-page-body">
  <main class="error-page">
    <div class="error-container">
      <div class="error-logo">
        <img src="images/icon.png" alt="Harbor Soccer Logo" width="120" height="120" />
      </div>

      <p class="error-code" aria-hidden="true">404</p>

      <h1 class="error-title">Oops! Page Not Found</h1>

      <p class="error-message">
        The page you're looking for seems to have wandered off the field.
        Don't worry though - we'll get you back to the game!
      </p>

      <div class="redirect-info">
        <p class="redirect-text">
          You'll be automatically redirected to our homepage in:
        </p>
        <p class="countdown" id="countdown" aria-live="polite">5</p>
        <div class="progress-bar" aria-hidden="true">
          <div class="progress-fill"></div>
        </div>
        <p class="redirect-note">Or click the button below to go there now.</p>
      </div>

      <a href="index.html" class="home-button">
        Take Me Home
      </a>
    </div>
  </main>

  <script type="module">
    let countdown = 5;
    const countdownElement = document.getElementById('countdown');

    const redirectHome = () => {
      window.location.href = 'index.html';
    };

    const timer = window.setInterval(() => {
      countdown -= 1;
      countdownElement.textContent = String(countdown);

      if (countdown <= 0) {
        window.clearInterval(timer);
        redirectHome();
      }
    }, 1000);

    document.addEventListener('keydown', () => {
      window.clearInterval(timer);
      redirectHome();
    });
  </script>
</body>

</html>
